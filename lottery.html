<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Serif TC',serif;position:relative}

/* ══ BACKGROUND ══ */
.bg{
  position:fixed;inset:0;z-index:0;
  background:url('抽獎畫面背景圖.png') center center / cover no-repeat;
}
/* very light overlay to unify brightness */
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(20,0,0,.06);
  pointer-events:none;
}

#fwCanvas{position:fixed;inset:0;pointer-events:none;z-index:50}

/* ══ CENTER STAGE ══
   Aligns with the large cream circle in the bg image.
   Circle center is ~50% x, ~43% y. Diameter ≈ 60% of viewport height.
*/
.center-stage{
  position:fixed;
  left:50%;
  top:47.5%;
  transform:translate(-50%,-52%);
  width:clamp(280px,42vw,800px);
  aspect-ratio:1/1;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(6px,1.4vh,14px);
  text-align:center;
  /* subtle inner vignette so content sits naturally inside circle */
  border-radius:50%;
  padding:clamp(16px,4%,0px);
}

/* ══ BOTTOM BUTTON AREA ══
   Sits just below the fan/扇 bottom edge, around 86-90% down.
*/
.bottom-btn-area{
  position:fixed;
  bottom:clamp(18px,4.5vh,52px);
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
}

/* ══ DRAW BUTTON — 剪紙風格 ══ */
.draw-btn{
  position:relative;
  padding:clamp(13px,1.7vh,19px) clamp(44px,5.5vw,80px);
  /* deep red base matching bg */
  background:linear-gradient(160deg, #7a0000 0%, #b50010 35%, #cc0015 50%, #b50010 65%, #7a0000 100%);
  /* double gold border: outer ring + inset */
  border:none;
  border-radius:56px;
  outline:none;
  cursor:pointer;
  /* layered box-shadow to simulate double gold border */
  box-shadow:
    0 0 0 2px #c8960a,
    0 0 0 4px rgba(245,197,24,.25),
    0 0 0 5px #8a5e00,
    0 5px 20px rgba(80,0,0,.55),
    inset 0 1px 0 rgba(255,220,100,.2),
    inset 0 -1px 0 rgba(0,0,0,.3);
  transition:all .22s;
  /* text */
  color:#f5c518;
  font-family:'Yuji Syuku',cursive;
  font-size:clamp(19px,2.5vw,34px);
  letter-spacing:5px;
  text-shadow:0 0 12px rgba(245,197,24,.9), 0 1px 3px rgba(0,0,0,.6);
  white-space:nowrap;
  /* decorative side diamonds via pseudo */
}
/* diamond decorations */
.draw-btn::before,.draw-btn::after{
  content:'◆';
  position:absolute;
  top:50%;transform:translateY(-50%);
  font-size:clamp(8px,1vw,13px);
  color:rgba(245,197,24,.7);
  letter-spacing:0;
}
.draw-btn::before{left:clamp(10px,1.4vw,18px)}
.draw-btn::after{right:clamp(10px,1.4vw,18px)}

.draw-btn:hover:not(:disabled){
  transform:translateY(-3px) scale(1.04);
  box-shadow:
    0 0 0 2px #e8c020,
    0 0 0 4px rgba(245,197,24,.4),
    0 0 0 5px #a07000,
    0 8px 32px rgba(100,0,0,.65),
    0 0 28px rgba(245,197,24,.25),
    inset 0 1px 0 rgba(255,220,100,.25),
    inset 0 -1px 0 rgba(0,0,0,.3);
}
.draw-btn:active:not(:disabled){transform:translateY(-1px) scale(1.01)}
.draw-btn:disabled{
  opacity:.38;cursor:not-allowed;transform:none;
  box-shadow:0 0 0 2px #666,0 0 0 4px transparent,0 0 0 5px #444,0 3px 10px rgba(0,0,0,.3);
  color:rgba(200,200,200,.5);text-shadow:none;
}
.draw-btn.spinning{
  animation:btn-spin .5s ease-in-out infinite alternate;
}
@keyframes btn-spin{
  from{box-shadow:0 0 0 2px #c8960a,0 0 0 4px rgba(245,197,24,.25),0 0 0 5px #8a5e00,0 5px 20px rgba(80,0,0,.55),inset 0 1px 0 rgba(255,220,100,.2)}
  to{box-shadow:0 0 0 2px #f5c518,0 0 0 5px rgba(245,197,24,.5),0 0 0 7px #c8960a,0 8px 40px rgba(120,0,0,.8),0 0 30px rgba(245,197,24,.4),inset 0 1px 0 rgba(255,220,100,.3)}
}

.draw-hint{
  font-size:clamp(11px,.92vw,13px);
  color:rgba(255,240,200,.75);
  letter-spacing:2px;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}

/* ══ TEXT COLORS for center stage (on cream/gold circle) ══ */
/* Labels */
.stage-label{
  font-size:clamp(11px,3vw,100px);
  color:rgba(100,30,0,.65);
  letter-spacing:4px;
  text-shadow:none;
}
/* Prize name */
.stage-prize-name{
  font-family:'Yuji Syuku',cursive;
  font-size:clamp(26px,4.2vw,60px);
  color:#7a1500;
  line-height:1.1;
  text-shadow:0 1px 6px rgba(245,197,24,.35), 0 2px 4px rgba(0,0,0,.1);
}
/* Sub text */
.stage-sub{
  font-size:clamp(10px,.88vw,13px);
  color:rgba(120,50,0,.6);
  letter-spacing:2px;
}

/* ══ SHOWCASE ══ */
#showcaseContent{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vh,14px);width:100%}

.sc-photo-wrap{
  position:relative;
  max-width:clamp(120px,25vw,700px);
  max-height:clamp(90px,18vh,220px);
}
.sc-photo{
  max-width:100%;max-height:100%;
  border-radius:10px;
  border:2px solid rgba(180,100,0,.45);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  display:block;
}
.lanterns{display:flex;gap:clamp(8px,2.5vw,28px);align-items:flex-end;margin:2px 0}
.lanterns svg{width:clamp(32px,5vw,62px);filter:drop-shadow(0 2px 6px rgba(160,40,0,.3))}

/* ══ DRAW SCREEN ══ */
#drawContent{display:none;flex-direction:column;align-items:center;gap:clamp(5px,1vh,12px);width:100%}

.ball-wrap{position:relative;flex-shrink:0}
.ball-glow{
  position:absolute;inset:-16px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(150,0,20,.2) 0%,transparent 70%);
  animation:bglow 2s ease-in-out infinite;pointer-events:none;
}
@keyframes bglow{0%,100%{opacity:.35}50%{opacity:.85}}
#ballCanvas{border-radius:50%;display:block}

/* ══ RESULT SCREEN ══ */
#resultContent{display:none;flex-direction:column;align-items:center;gap:clamp(6px,1.2vh,14px);width:100%}

.rs-prize-label{
  font-size:clamp(11px,.95vw,14px);
  color:rgba(100,30,0,.65);
  letter-spacing:3px;
}
.rs-winners{display:flex;flex-wrap:wrap;gap:clamp(7px,1.3vw,13px);justify-content:center}
.rs-winner{
  font-family:'Yuji Syuku',cursive;
  font-size:clamp(24px,3.8vw,54px);
  color:#7a1500;
  padding:clamp(4px,.7vh,8px) clamp(10px,1.8vw,22px);
  background:rgba(255,245,200,.72);
  border:1.5px solid rgba(170,90,0,.4);
  border-radius:9px;
  cursor:pointer;
  transition:all .2s;
  text-shadow:0 1px 3px rgba(220,160,0,.3);
  opacity:0;transform:scale(.35) translateY(22px);
  backdrop-filter:blur(1px);
  /* double gold border hint */
  box-shadow:0 0 0 1px rgba(200,140,0,.2), 0 2px 8px rgba(0,0,0,.12);
}
.rs-winner.visible{animation:wpop .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes wpop{to{opacity:1;transform:scale(1) translateY(0)}}
.rs-winner:hover{
  background:rgba(255,230,160,.85);
  border-color:rgba(170,80,0,.6);
  transform:scale(1.07);
  box-shadow:0 0 0 1px rgba(200,140,0,.4),0 4px 14px rgba(0,0,0,.18);
}
.rs-winner.removed{
  background:rgba(190,180,170,.3)!important;
  border-color:rgba(150,140,130,.3)!important;
  color:rgba(120,100,80,.35)!important;
  text-decoration:line-through;
  cursor:default;pointer-events:none;
  transform:scale(.92)!important;text-shadow:none;
  box-shadow:none!important;
}

.rs-tip{
  font-size:clamp(10px,.82vw,12px);
  color:rgba(120,55,0,.55);
  letter-spacing:1px;
}

.rs-actions{display:flex;gap:clamp(8px,1.4vw,16px);flex-wrap:wrap;justify-content:center}
/* result confirm button — gold style matching the bg gold tones */
.rs-btn{
  padding:clamp(6px,.85vh,10px) clamp(14px,2.2vw,26px);
  border-radius:28px;
  font-family:'Yuji Syuku',cursive;
  font-size:clamp(12px,1.2vw,16px);
  letter-spacing:2px;cursor:pointer;transition:all .2s;
}
.rs-btn-confirm{
  background:linear-gradient(135deg,#7a4800,#c07800,#e8a800,#c07800,#7a4800);
  border:none;color:#fff8e0;
  box-shadow:0 0 0 1.5px rgba(245,197,24,.5), 0 3px 12px rgba(100,60,0,.35);
  text-shadow:0 1px 3px rgba(0,0,0,.4);
}
.rs-btn-confirm:hover{transform:scale(1.06);box-shadow:0 0 0 2px rgba(245,197,24,.8),0 5px 18px rgba(100,60,0,.5)}
.rs-btn-redraw{
  background:rgba(255,245,210,.3);
  border:1.5px solid rgba(150,80,0,.4);
  color:rgba(100,40,0,.7);
  backdrop-filter:blur(2px);
}
.rs-btn-redraw:hover{background:rgba(255,240,190,.5);border-color:rgba(150,80,0,.7)}
.rs-btn-redraw:disabled{opacity:.3;cursor:not-allowed}

/* ══ HISTORY BAR ══ */
.history-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:5;
  background:rgba(80,0,0,.72);
  border-top:1px solid rgba(200,140,0,.4);
  height:32px;
  overflow:hidden;
  display:flex;
  align-items:center;
}
.marquee-track{
  display:flex;
  gap:clamp(24px,5vw,60px);
  white-space:nowrap;
  flex-shrink:0;
  left:0;top:0;height:100%;
  align-items:center;
}
.hb-item{font-size:clamp(10px,.88vw,18px);color:rgba(255,230,160,.65);flex-shrink:0}
.hb-item span{color:rgba(245,197,24,.9);font-weight:700;margin-right:3px}

/* ══ POOL MODAL BUTTON ══ */
.pool-modal-btn{
  position:fixed;top:16px;right:16px;z-index:20;
  width:42px;height:42px;border-radius:50%;
  background:rgba(80,0,0,.75);
  border:1.5px solid rgba(200,140,0,.5);
  color:rgba(255,230,160,.9);font-size:18px;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.pool-modal-btn:hover{background:rgba(120,0,0,.9);border-color:rgba(245,197,24,.8)}

/* ══ POOL MODAL ══ */
.pool-modal-backdrop{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  animation:fi .2s ease;
}
@keyframes fi{from{opacity:0}to{opacity:1}}
.pool-modal{
  background:rgba(30,5,0,.95);
  border:1.5px solid rgba(200,140,0,.4);
  border-radius:14px;
  width:clamp(300px,80vw,960px);   /* 原本 60vw,680px */
  max-height:85vh;           
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:mp .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mp{from{transform:scale(.88) translateY(16px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.pool-modal-close{
  position:absolute;top:12px;right:14px;
  background:rgba(255,245,200,.12);
  border:1px solid rgba(200,140,0,.35);
  border-radius:6px;
  color:rgba(255,230,160,.8);
  font-size:16px;
  padding:4px 12px;
  cursor:pointer;
  transition:all .15s;
  letter-spacing:1px;
}
.pool-modal-close:hover{
  background:rgba(180,0,0,.5);
  border-color:rgba(245,197,24,.6);
  color:rgba(255,230,160,1);
}
.pool-modal-tabs{
  display:flex;border-bottom:1px solid rgba(200,140,0,.25);
  flex-shrink:0;padding:0 16px;gap:4px;padding-top:12px;
}
.pmt{
  padding:8px 20px;background:transparent;
  border:none;border-bottom:2px solid transparent;
  color:rgba(255,230,160,.45);font-family:'Noto Serif TC',serif;
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:-1px;letter-spacing:1px;
}
.pmt.active{color:rgba(245,197,24,.9);border-bottom-color:rgba(245,197,24,.8)}
.pmt:hover:not(.active){color:rgba(255,230,160,.7)}
.pool-modal-content{
  flex:1;overflow-y:auto;padding:16px 20px;
}
.pool-modal-content::-webkit-scrollbar{width:4px}
.pool-modal-content::-webkit-scrollbar-track{background:transparent}
.pool-modal-content::-webkit-scrollbar-thumb{background:rgba(200,140,0,.3);border-radius:2px}

/* pool grid */
.pm-pool-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
  gap:8px;
}
.pm-chip{
  padding:8px 12px;
  border-radius:20px;
  font-size:28px;
  background:rgba(255,245,200,.08);
  border:1px solid rgba(200,140,0,.25);
  color:rgba(255,230,160,.75);
  text-align:center;
}
.pm-chip.drawn{
  opacity:.3;text-decoration:line-through;
  background:transparent;border-color:rgba(150,150,150,.2);
  color:rgba(200,200,200,.4);
}
/* history list */
.pm-hist-item{
  padding:10px 0;
  border-bottom:1px solid rgba(200,140,0,.15);
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
}
.pm-hist-item:last-child{border-bottom:none}
.pm-hist-prize{color:rgba(245,197,24,.85);font-weight:700;font-size:28px;min-width:70px;flex-shrink:0}
.pm-hist-names{color:rgba(255,230,160,.6);font-size:28px}
.pm-empty{color:rgba(255,230,160,.25);font-size:13px;text-align:center;padding:24px 0}
.pm-stats{font-size:11px;color:rgba(255,230,160,.35);margin-bottom:12px;letter-spacing:1px}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>
<canvas id="fwCanvas"></canvas>

<!-- ══ CENTER STAGE ══ -->
<div class="center-stage">

  <!-- SHOWCASE -->
  <div id="showcaseContent">
    <div class="stage-label">✦ 即將抽出 ✦</div>
    <div class="stage-prize-name" id="sc-name">載入中...</div>
    <div id="sc-media"></div>
  </div>

  <!-- DRAW -->
  <div id="drawContent">
    <div class="stage-label">✦ 當前獎項 ✦</div>
    <div class="stage-prize-name" id="pb-name">—</div>
    <div class="stage-sub" id="pb-remain"></div>
    <div class="ball-wrap">
      <div class="ball-glow"></div>
      <canvas id="ballCanvas"></canvas>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultContent">
    <div class="rs-prize-label" id="rs-prize"></div>
    <div class="rs-winners" id="rs-winners"></div>
    <div class="rs-tip" id="rs-tip">點擊名字可替出並補抽</div>
    <div class="rs-actions">
      <button class="rs-btn rs-btn-redraw" id="rs-redraw-btn" onclick="redrawAll()" disabled>↺ 重新抽取</button>
      <button class="rs-btn rs-btn-confirm" onclick="confirmAndNext()">確認，繼續 →</button>
    </div>
  </div>

</div>

<!-- ══ BOTTOM DRAW BUTTON ══ -->
<div class="bottom-btn-area" id="bottomBtnArea">
  <button class="draw-btn" id="drawBtn" onclick="onDrawBtnClick()" disabled>
    🎊 開始抽獎 🎊
  </button>
  <div class="draw-hint" id="drawHint">載入中...</div>
</div>

<!-- HISTORY -->
<div class="history-bar" id="histBar"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const FC={
  apiKey:"AIzaSyBGFmsS650FPekmUnx_jYuYCTU1FI7zi88",
  authDomain:"new-year-lottery-6ed97.firebaseapp.com",
  databaseURL:"https://new-year-lottery-6ed97-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"new-year-lottery-6ed97",
  storageBucket:"new-year-lottery-6ed97.firebasestorage.app",
  messagingSenderId:"486853529047",
  appId:"1:486853529047:web:4b83dc16a00c9226efcf92"
};
firebase.initializeApp(FC);
const db=firebase.database();

let members={},prizes=[],history=[],lstate={currentPrizeIdx:0,phase:'idle'};
let ballAnim=null,fwAnim=null,balls=[],fwParts=[];
let ballSize=0,isSpinning=false;
let currentWinners=[],pendingRemovals=[];
let screen='showcase';

function init(){
  sizeBall();
  window.addEventListener('resize',()=>{sizeBall();populateBalls();});
  db.ref('members').on('value',s=>{members=s.val()||{};populateBalls();updUI();});
  db.ref('prizes').on('value',s=>{
    const r=s.val();
    prizes=r?(Array.isArray(r)?r:Object.values(r)).sort((a,b)=>a.order-b.order):[];
    updUI();
  });
  db.ref('history').on('value',s=>{
    const r=s.val();
    history=r?Object.values(r).sort((a,b)=>a.timestamp-b.timestamp):[];
    renderHistBar();
  });
  db.ref('state').on('value',s=>{lstate=s.val()||{currentPrizeIdx:0,phase:'idle'};updUI();});
  startBallAnim();
}

function sizeBall(){
  const vw=window.innerWidth,vh=window.innerHeight;
  ballSize=Math.min(Math.floor(vh*.56),Math.floor(vw*.47),720);
  const c=document.getElementById('ballCanvas');
  c.width=ballSize;c.height=ballSize;
  c.style.width=ballSize+'px';c.style.height=ballSize+'px';
}

function setScreen(s){
  screen=s;
  document.getElementById('showcaseContent').style.display=s==='showcase'?'flex':'none';
  document.getElementById('drawContent').style.display=s==='draw'?'flex':'none';
  document.getElementById('resultContent').style.display=s==='result'?'flex':'none';
  document.getElementById('bottomBtnArea').style.display=s==='result'?'none':'flex';
}

function updUI(){
  if(screen==='result')return;
  const idx=lstate.currentPrizeIdx||0;
  const pool=Object.values(members).filter(m=>m.inPool);
  const btn=document.getElementById('drawBtn');
  const hint=document.getElementById('drawHint');

  if(!prizes.length||idx>=prizes.length){
    setScreen('showcase');
    document.getElementById('sc-name').textContent=!prizes.length?'請先在後台設定獎項':'🎉 所有獎項已抽完！';
    document.getElementById('sc-media').innerHTML='';
    btn.disabled=true;hint.textContent='';
    return;
  }

  const p=prizes[idx];

  if(screen==='showcase'){
    document.getElementById('sc-name').textContent=p.name;
    const media=document.getElementById('sc-media');
    if(p.photoURL){
      media.innerHTML=`<div class="sc-photo-wrap"><img class="sc-photo" src="${p.photoURL}" alt="獎品照片"></div>`;
    } else {
      media.innerHTML=`<div class="lanterns">${lsv('#c0152a','#f5c518')}${lsv('#7a0000','#ffe066')}${lsv('#c0152a','#f5c518')}</div>`;
    }
    btn.textContent='🎯 開始抽獎';
    btn.disabled=false;
    hint.textContent='';
  }

  if(screen==='draw'){
    document.getElementById('pb-name').textContent=p.name;
    document.getElementById('pb-remain').textContent='剩餘名額：'+p.remaining+' 人';
    btn.textContent='🎊 開始抽獎 🎊';
    if(!pool.length){btn.disabled=true;hint.textContent='抽獎池已空，請在後台重置';}
    else{btn.disabled=false;hint.textContent='從 '+pool.length+' 人中抽出 '+Math.min(p.remaining,pool.length)+' 位';}
  }
}

function showShowcase(idx){
  setScreen('showcase');
  if(!prizes.length||idx>=prizes.length){
    document.getElementById('sc-name').textContent=!prizes.length?'請先在後台設定獎項':'🎉 所有獎項已抽完！';
    document.getElementById('sc-media').innerHTML='';
    document.getElementById('drawBtn').disabled=true;
    document.getElementById('drawHint').textContent='';
    return;
  }
  const p=prizes[idx];
  document.getElementById('sc-name').textContent=p.name;
  const media=document.getElementById('sc-media');
  if(p.photoURL){
    media.innerHTML=`<div class="sc-photo-wrap"><img class="sc-photo" src="${p.photoURL}" alt="獎品照片"></div>`;
  } else {
    media.innerHTML=`<div class="lanterns">${lsv('#c0152a','#f5c518')}${lsv('#7a0000','#ffe066')}${lsv('#c0152a','#f5c518')}</div>`;
  }
  document.getElementById('drawBtn').textContent='🎯 開始抽獎';
  document.getElementById('drawBtn').disabled=false;
  document.getElementById('drawHint').textContent='';
}

function onDrawBtnClick(){
  // doDraw();
  if(screen==='showcase'){setScreen('draw');updUI();}
  else if(screen==='draw'){doDraw();} 
}

function lsv(bc,tc){
  return`<svg viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
    <line x1="40" y1="0" x2="40" y2="18" stroke="${tc}" stroke-width="2"/>
    <ellipse cx="40" cy="22" rx="12" ry="5" fill="${tc}"/>
    <ellipse cx="40" cy="75" rx="30" ry="44" fill="${bc}"/>
    <ellipse cx="40" cy="75" rx="22" ry="40" fill="none" stroke="${tc}" stroke-width="1.5" opacity=".4"/>
    <ellipse cx="40" cy="119" rx="12" ry="5" fill="${tc}"/>
    <line x1="34" y1="119" x2="30" y2="138" stroke="${tc}" stroke-width="2"/>
    <line x1="40" y1="119" x2="40" y2="140" stroke="${tc}" stroke-width="2"/>
    <line x1="46" y1="119" x2="50" y2="138" stroke="${tc}" stroke-width="2"/>
    <text x="40" y="82" text-anchor="middle" font-size="22" fill="${tc}" font-family="serif">福</text>
  </svg>`;
}

async function doDraw(){
  const idx=lstate.currentPrizeIdx||0;
  if(idx>=prizes.length)return;
  const prize=prizes[idx];
  const pool=Object.values(members).filter(m=>m.inPool);
  if(!pool.length)return;

  const btn=document.getElementById('drawBtn');
  btn.classList.add('spinning');btn.disabled=true;
  document.getElementById('drawHint').textContent='抽獎中...';
  isSpinning=true;

  setTimeout(async()=>{
    isSpinning=false;
    const cnt=Math.min(prize.remaining,pool.length);
    const winners=[...pool].sort(()=>Math.random()-.5).slice(0,cnt);
    currentWinners=winners.map(w=>({name:w.name,removed:false}));
    pendingRemovals=[];
    btn.classList.remove('spinning');

    const u={};
    winners.forEach(w=>{
      const id=Object.entries(members).find(([,m])=>m.name===w.name)?.[0];
      if(id)u['members/'+id+'/inPool']=false;
    });
    u['prizes/'+idx+'/remaining']=prize.remaining-cnt;
    await db.ref().update(u);

    showResult(prize.name,currentWinners);
    launchFW();
  },2600);
}

function showResult(prizeName,arr){
  setScreen('result');
  document.getElementById('rs-prize').textContent='🏆 '+prizeName;
  const con=document.getElementById('rs-winners');
  con.innerHTML='';
  arr.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='rs-winner';d.id='wc-'+i;d.textContent=w.name;
    d.onclick=()=>removeW(i);con.appendChild(d);
  });
  arr.forEach((_,i)=>setTimeout(()=>{const e=document.getElementById('wc-'+i);if(e)e.classList.add('visible');},300+i*600));
  const rb=document.getElementById('rs-redraw-btn');
  rb.disabled=true;
  setTimeout(()=>{rb.disabled=false;},300+arr.length*600+300);
}

function removeW(i){
  if(currentWinners[i].removed)return;
  currentWinners[i].removed=true;
  pendingRemovals.push(currentWinners[i].name);
  const e=document.getElementById('wc-'+i);if(e)e.classList.add('removed');
  redrawOne(i);
}

async function redrawOne(ri){
  const activeNames=currentWinners.filter(w=>!w.removed).map(w=>w.name);
  const pool=Object.values(members).filter(m=>m.inPool&&!activeNames.includes(m.name));
  if(!pool.length){document.getElementById('rs-tip').textContent='⚠ 抽獎池已無其他人可補抽';return;}
  const nw=pool[Math.floor(Math.random()*pool.length)];
  currentWinners[ri]={name:nw.name,removed:false};
  const id=Object.entries(members).find(([,m])=>m.name===nw.name)?.[0];
  if(id)await db.ref('members/'+id+'/inPool').set(false);
  const e=document.getElementById('wc-'+ri);
  if(e){e.classList.remove('removed','visible');e.textContent=nw.name;e.onclick=()=>removeW(ri);setTimeout(()=>e.classList.add('visible'),50);}
  document.getElementById('rs-tip').textContent='點擊名字可替出並補抽';
}

async function redrawAll(){
  const u={};
  currentWinners.forEach(w=>{
    if(!w.removed){const id=Object.entries(members).find(([,m])=>m.name===w.name)?.[0];if(id)u['members/'+id+'/inPool']=true;}
  });
  const idx=lstate.currentPrizeIdx||0;
  const ac=currentWinners.filter(w=>!w.removed).length;
  if(prizes[idx])u['prizes/'+idx+'/remaining']=(prizes[idx].remaining||0)+ac;
  if(Object.keys(u).length)await db.ref().update(u);
  currentWinners=[];pendingRemovals=[];
  setScreen('draw');updUI();
}

async function confirmAndNext(){
  const idx=lstate.currentPrizeIdx||0;
  const prize=prizes[idx];if(!prize)return;
  const aw=currentWinners.filter(w=>!w.removed).map(w=>w.name);
  const hk=Date.now().toString(36);
  const u={};
  u['history/'+hk]={prize:prize.name,winners:aw,timestamp:Date.now()};
  u['state/currentPrizeIdx']=idx+1;
  u['state/phase']='idle';
  await db.ref().update(u);
  currentWinners=[];pendingRemovals=[];
  lstate.currentPrizeIdx=idx+1;
  showShowcase(lstate.currentPrizeIdx);
}

let marqueeX = window.innerWidth;
let marqueeRAF = null;
let marqueeSpeed = 1.4;
let marqueeRunId = 0; // 每次啟動給一個唯一 ID，舊 loop 發現 ID 不對就自動停止

function startMarquee(){
  marqueeRunId++; // 讓所有舊的 loop 失效
  const myId = marqueeRunId;
  if(marqueeRAF){ cancelAnimationFrame(marqueeRAF); marqueeRAF=null; }
  function step(){
    if(myId !== marqueeRunId) return; // 我已經是舊的了，停止
    const track = document.getElementById('marquee-track');
    if(!track){ marqueeRAF=null; return; }
    marqueeX -= marqueeSpeed;
    const halfW = track.scrollWidth / 2;
    if(halfW > 0 && marqueeX <= -halfW) marqueeX += halfW;
    track.style.transform = `translateX(${marqueeX}px)`;
    marqueeRAF = requestAnimationFrame(step);
  }
  marqueeRAF = requestAnimationFrame(step);
}

function renderHistBar(){
  const el = document.getElementById('histBar');
  if(!history.length){ el.innerHTML=''; return; }

  let track = document.getElementById('marquee-track');

  if(!track){
    // 第一次：建立 track，初始化位置從右側進入
    marqueeX = window.innerWidth;
    const items = history.map(h =>
      `<div class="hb-item"><span>${h.prize}</span>${h.winners.join('、')}</div>`
    ).join('');
    el.innerHTML = `<div id="marquee-track" class="marquee-track">${items}${items}</div>`;
    startMarquee();
    el.dataset.count = history.length;
    return;
  }

 // 有新紀錄才更新內容
  const currentCount = parseInt(el.dataset.count || '0');
  if(history.length <= currentCount) return;

  // 停掉動畫
  if(marqueeRAF){ cancelAnimationFrame(marqueeRAF); marqueeRAF=null; }

  // 保留當前位移，重建內容
  const items = history.map(h =>
    `<div class="hb-item"><span>${h.prize}</span>${h.winners.join('、')}</div>`
  ).join('');
  el.innerHTML = `<div id="marquee-track" class="marquee-track">${items}${items}</div>`;
  // 繼續從目前位置跑，不重置 marqueeX
  document.getElementById('marquee-track').style.transform = `translateX(${marqueeX}px)`;
  el.dataset.count = history.length;
  startMarquee(); // 重新啟動（舊的已確實停止）
}

/* ── BALL ── */
const BC=[
  '#1a6b3a', // 墨綠
  '#b8860b', // 深金
  '#1a3a7a', // 深藍
  '#6b1a6b', // 深紫
  '#c07000', // 橙金
  '#1a6b6b', // 深青
  '#7a1a1a', // 深酒紅
  '#3a5a1a', // 橄欖綠
];
const BRR=0.074;

function populateBalls(){
  const pool=Object.values(members).filter(m=>m.inPool);
  const sz=ballSize||240,cx=sz/2,cy=sz/2,R=sz/2,br=Math.floor(sz*BRR);
  balls=pool.slice(0,52).map(m=>{
    const a=Math.random()*Math.PI*2,r=Math.random()*(R-br-6);
    return{name:m.name,x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,
      vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*1.4,
      color:BC[Math.floor(Math.random()*BC.length)]};
  });
}

function startBallAnim(){
  if(ballAnim)cancelAnimationFrame(ballAnim);
  (function f(){drawBall();ballAnim=requestAnimationFrame(f);})();
}

function darkenColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(r-60,0)},${Math.max(g-60,0)},${Math.max(b-60,0)})`;
}

function lightenColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(r+80,255)},${Math.min(g+80,255)},${Math.min(b+80,255)})`;
}

function drawBall(){
  const c=document.getElementById('ballCanvas');if(!c)return;
  const ctx=c.getContext('2d');
  const sz=ballSize||240,cx=sz/2,cy=sz/2,R=sz/2-2,br=Math.floor(sz*BRR),spd=isSpinning?4.5:1;

  // 搖晃偏移（抽獎中才啟動）
  const shakeX = isSpinning ? (Math.random()-0.5)*6 : 0;
  const shakeY = isSpinning ? (Math.random()-0.5)*6 : 0;

  ctx.clearRect(0,0,sz,sz);
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // ── 大球背景 ──
  const sg=ctx.createRadialGradient(cx-sz*.22,cy-sz*.22,sz*.04,cx,cy,R);
  sg.addColorStop(0,'#c01020');
  sg.addColorStop(0.4,'#8a0010');
  sg.addColorStop(1,'#380000');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();

  // 大球高光（左上強反光）
  const hi=ctx.createRadialGradient(cx-R*.42,cy-R*.42,R*.02,cx-R*.28,cy-R*.28,R*.55);
  hi.addColorStop(0,'rgba(255,255,255,.55)');
  hi.addColorStop(0.4,'rgba(255,255,255,.12)');
  hi.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=hi;ctx.fill();

  // 大球底部陰影
  const sh2=ctx.createRadialGradient(cx+R*.3,cy+R*.35,R*.05,cx+R*.2,cy+R*.25,R*.6);
  sh2.addColorStop(0,'rgba(0,0,0,.45)');
  sh2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=sh2;ctx.fill();

  // ── 小球 ──
  balls.forEach(b=>{
    b.x+=b.vx*spd;b.y+=b.vy*spd;
    const d=Math.sqrt((b.x-cx)**2+(b.y-cy)**2),mD=R-br-2;
    if(d>mD){
      const nx=(b.x-cx)/d,ny=(b.y-cy)/d,dot=b.vx*nx+b.vy*ny;
      b.vx-=2*dot*nx;b.vy-=2*dot*ny;
      b.x=cx+nx*mD;b.y=cy+ny*mD;
    }

    // 小球主體漸層
    const bg=ctx.createRadialGradient(b.x-br*.32,b.y-br*.38,br*.06,b.x,b.y,br);
    bg.addColorStop(0,lightenColor(b.color));
    bg.addColorStop(0.6,b.color);
    bg.addColorStop(1,darkenColor(b.color));
    ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

    // 小球高光（左上白色光點）
    const bhi=ctx.createRadialGradient(
      b.x-br*.38,b.y-br*.42,br*.02,
      b.x-br*.22,b.y-br*.26,br*.45
    );
    bhi.addColorStop(0,'rgba(255,255,255,.75)');
    bhi.addColorStop(0.35,'rgba(255,255,255,.2)');
    bhi.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fillStyle=bhi;ctx.fill();

    // 小球底部暗影
    const bsh=ctx.createRadialGradient(b.x+br*.3,b.y+br*.32,br*.04,b.x+br*.18,b.y+br*.2,br*.5);
    bsh.addColorStop(0,'rgba(0,0,0,.4)');
    bsh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fillStyle=bsh;ctx.fill();

    // 小球邊框（金色細線）
    ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);
    ctx.strokeStyle='rgba(245,197,24,.35)';ctx.lineWidth=1;ctx.stroke();

    // 名字
    const fs=b.name.length>3?Math.floor(br*.68):Math.floor(br*.82);
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.font=`bold ${fs}px "Noto Serif TC",serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    // 文字陰影
    ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=3;
    ctx.fillText(b.name.length>4?b.name.slice(0,4)+'…':b.name,b.x,b.y);
    ctx.shadowBlur=0;
  });

  // 大球邊框金環
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(245,197,24,.7)';ctx.lineWidth=3;ctx.stroke();

  // 大球內環（增加層次感）
  ctx.beginPath();ctx.arc(cx,cy,R-4,0,Math.PI*2);
  ctx.strokeStyle='rgba(245,197,24,.2)';ctx.lineWidth=1.5;ctx.stroke();

  ctx.restore();
}

/* ── FIREWORKS ── */
function launchFW(){
  const c=document.getElementById('fwCanvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  fwParts=[];
  for(let i=0;i<12;i++)setTimeout(()=>burst(ctx,c),i*210);
  if(fwAnim)cancelAnimationFrame(fwAnim);
  animFW(ctx,c);
  setTimeout(()=>{cancelAnimationFrame(fwAnim);ctx.clearRect(0,0,c.width,c.height);},4800);
}
function burst(ctx,c){
  const x=c.width*.1+Math.random()*c.width*.8,y=Math.random()*c.height*.5;
  const cols=['#f5c518','#ff4444','#ff8800','#ffe066','#fff','#ff66cc','#44ffdd'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<65;i++){
    const a=(Math.PI*2/65)*i,sp=2+Math.random()*6;
    fwParts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,color:col,r:1.5+Math.random()*3});
  }
}
function animFW(ctx,c){
  ctx.clearRect(0,0,c.width,c.height);
  fwParts=fwParts.filter(p=>p.alpha>.02);
  fwParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.vx*=.99;p.alpha-=.013;
    ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();});
  fwAnim=requestAnimationFrame(()=>animFW(ctx,c));
}

function toggleModal(){
  const m=document.getElementById('poolModal');
  const isOpen=m.style.display==='flex';
  if(!isOpen){renderModalPool();renderModalHist();}
  m.style.display=isOpen?'none':'flex';
}

function switchTab(tab){
  document.getElementById('modal-pool-content').style.display=tab==='pool'?'block':'none';
  document.getElementById('modal-hist-content').style.display=tab==='hist'?'block':'none';
  document.getElementById('tab-pool').className='pmt'+(tab==='pool'?' active':'');
  document.getElementById('tab-hist').className='pmt'+(tab==='hist'?' active':'');
}

function renderModalPool(){
  const el=document.getElementById('modal-pool-content');
  const arr=Object.values(members);
  if(!arr.length){el.innerHTML='<div class="pm-empty">名單為空</div>';return;}
  const inPool=arr.filter(m=>m.inPool).length;
  el.innerHTML=`<div class="pm-stats">共 ${arr.length} 人　抽獎池剩餘 ${inPool} 人　已抽出 ${arr.length-inPool} 人</div>
    <div class="pm-pool-grid">${arr.map(m=>`<div class="pm-chip ${m.inPool?'':'drawn'}">${m.name}</div>`).join('')}</div>`;
}

function renderModalHist(){
  const el=document.getElementById('modal-hist-content');
  if(!history.length){el.innerHTML='<div class="pm-empty">尚未有得獎紀錄</div>';return;}
  el.innerHTML=history.map(h=>`
    <div class="pm-hist-item">
      <span class="pm-hist-prize">🏆 ${h.prize}</span>
      <span class="pm-hist-names">${h.winners.join('、')}</span>
    </div>`).join('');
}
